<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeciSight Demo</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Syne:wght@700;800&family=DM+Mono:wght@500&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#07090d;overflow:hidden;font-family:'DM Sans',sans-serif}
canvas{display:block;position:fixed;top:46px;left:0;width:100%;height:calc(100vh - 102px)}
.bar{position:fixed;top:0;left:0;right:0;height:46px;background:#0a0d14;border-bottom:1px solid #1a2438;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:10}
.logo{font-family:'Syne',sans-serif;font-size:16px;font-weight:800;color:#f0f4f8}
.logo em{color:#22c55e;font-style:normal}
.pills{display:flex;gap:6px}
.pill{padding:3px 8px;border:1px solid #1a2438;border-radius:5px;font-family:'DM Mono',monospace;font-size:9px;color:#384858;transition:all .3s}
.pill.on{border-color:var(--c);color:var(--c)}
.bar-r{display:flex;align-items:center;gap:10px}
.tmr{font-family:'DM Mono',monospace;font-size:11px;color:#384858}
.ctrl{position:fixed;bottom:0;left:0;right:0;height:56px;background:#0a0d14;border-top:1px solid #1a2438;display:flex;align-items:center;justify-content:space-between;padding:0 20px;z-index:10}
.topic{font-family:'DM Mono',monospace;font-size:10px;color:#384858}
.topic b{color:#c0d8e8;font-weight:400}
.btns{display:flex;gap:8px;align-items:center}
.bplay{width:40px;height:40px;background:#22c55e;border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.bplay svg{width:15px;height:15px}
.bsm{width:32px;height:32px;background:rgba(255,255,255,.04);border:1px solid #1a2438;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.bsm svg{width:13px;height:13px;stroke:#6a8898;stroke-width:1.8;fill:none;stroke-linecap:round}
.bsm.muted{border-color:rgba(239,68,68,.3)}
.prog{display:flex;align-items:center;gap:8px}
.pbar{width:100px;height:3px;background:#1a2438;border-radius:2px;overflow:hidden}
.pfill{height:100%;background:#22c55e;width:0%;transition:width .4s}
.pct{font-family:'DM Mono',monospace;font-size:10px;color:#22c55e;min-width:26px}
.fcta{background:#22c55e;color:#09090b;font-family:'Syne',sans-serif;font-size:11px;font-weight:700;padding:6px 14px;border-radius:6px;text-decoration:none;opacity:0;pointer-events:none;transition:opacity .5s}
.fcta.show{opacity:1;pointer-events:auto}
#bub{position:fixed;z-index:9;width:340px;pointer-events:none;opacity:0;transition:opacity .25s,transform .25s;transform:translateY(6px)}
#bub.show{opacity:1;transform:translateY(0)}
.bbox{background:rgba(5,8,15,.97);border:1.5px solid rgba(255,255,255,.12);border-radius:12px;padding:12px 14px;box-shadow:0 12px 40px rgba(0,0,0,.8)}
.bbox.ds{background:rgba(3,10,7,.97);border-color:rgba(34,197,94,.38)}
.bbox.ds-active{
  background:linear-gradient(135deg,rgba(0,8,4,.98) 0%,rgba(0,18,10,.98) 100%);
  border:1.5px solid rgba(0,255,136,.5);
  box-shadow:0 0 0 1px rgba(0,255,136,.08),0 20px 60px rgba(0,0,0,.9),0 0 40px rgba(0,255,136,.06);
  position:relative;
  overflow:hidden;
}
.bbox.ds-active::before{
  content:'';
  position:absolute;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 28px,rgba(0,255,136,.025) 28px,rgba(0,255,136,.025) 29px);
  pointer-events:none;
}
.bbox.ds-active .bub-txt strong{color:#00ff88}
.bbox.ds-active .bhead{border-bottom-color:rgba(0,255,136,.15)}
.bbox.ds-active .bub-sol{
  background:rgba(0,255,136,.06);
  border:1px solid rgba(0,255,136,.25);
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:#88ffcc;
}
.bbox.ds-active .bsol-l{color:#00ff88;letter-spacing:.1em}
.bhead{display:flex;align-items:center;gap:6px;margin-bottom:7px;padding-bottom:7px;border-bottom:1px solid rgba(255,255,255,.06)}
.ds-active .bhead{position:relative}
.ds-status{display:none;font-family:'DM Mono',monospace;font-size:8px;color:#00ff88;margin-left:auto;letter-spacing:.08em;animation:blink 1.2s infinite}
.ds-active .ds-status{display:block}
.ds-bar{display:none;height:2px;background:linear-gradient(90deg,transparent,#00ff88,transparent);position:absolute;bottom:-1px;left:0;right:0;animation:scan 2s linear infinite}
.ds-active .ds-bar{display:block}
@keyframes scan{0%{transform:scaleX(0);transform-origin:left}50%{transform:scaleX(1);transform-origin:left}50.1%{transform:scaleX(1);transform-origin:right}100%{transform:scaleX(0);transform-origin:right}}
.bdot{width:8px;height:8px;border-radius:50%}
.bname{font-family:'Syne',sans-serif;font-size:12px;font-weight:700}
.brole{font-family:'DM Mono',monospace;font-size:9px;color:#384858}
.btxt{font-size:13px;color:#a8c0d4;line-height:1.6;font-weight:300}
.btxt strong{color:#eef2f8;font-weight:500}
.bbox.ds .btxt strong{color:#22c55e}
.bsol{margin-top:9px;background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);border-radius:7px;padding:8px 10px}
.bsol-l{font-family:'DM Mono',monospace;font-size:8px;color:#22c55e;text-transform:uppercase;letter-spacing:.07em;margin-bottom:3px}
.bsol-t{font-family:'DM Mono',monospace;font-size:10px;color:#7ecf9c;line-height:1.5}
.start{position:fixed;inset:0;z-index:20;background:rgba(7,9,13,.9);backdrop-filter:blur(10px);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;cursor:pointer;transition:opacity .5s}
.start.gone{opacity:0;pointer-events:none}
.sring{width:80px;height:80px;border:2px solid rgba(34,197,94,.35);border-radius:50%;display:flex;align-items:center;justify-content:center;background:rgba(34,197,94,.08);transition:all .2s}
.start:hover .sring{background:rgba(34,197,94,.18);transform:scale(1.06)}
.sring svg{width:30px;height:30px;fill:#22c55e}
.sh{font-family:'Syne',sans-serif;font-size:19px;font-weight:800;color:#f0f4f8}
.ss{font-family:'DM Mono',monospace;font-size:10px;color:#384858}
</style>

<script>
// ── Auto-configure voice (key stored in browser only) ──
(function(){
  try {
    // Only set if not already set by user
    if (!localStorage.getItem('el_key')) {
      localStorage.setItem('el_key', atob('c2tfYmJjNmJhNTgxN2ZmMzJmODljY2RmMGQ0OWVlMWIwN2FjYzAyMjAzNmI2ZjBiYjNk'));
    }
  } catch(e) {}
})();
// ═══════════════════════════════════════════════════
// CANVAS SETUP
// ═══════════════════════════════════════════════════
var cv = document.getElementById('cv');
var ctx = cv.getContext('2d');
var W = 0, H = 0;

function resize() {
  W = window.innerWidth;
  H = window.innerHeight - 102; // 46 top + 56 bottom
  cv.width = W;
  cv.height = H;
  cv.style.width = W + 'px';
  cv.style.height = H + 'px';
}
resize();
window.addEventListener('resize', resize);

// Roundrect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r) {
    r = +r || 4;
    this.beginPath();
    this.moveTo(x+r,y); this.lineTo(x+w-r,y); this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r); this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h); this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r); this.arcTo(x,y,x+r,y,r);
    this.closePath(); return this;
  };
}

// ═══════════════════════════════════════════════════
// ISOMETRIC PROJECTION
// ═══════════════════════════════════════════════════
var ISO = 54; // tile size px
var OX = 0, OY = 0;

function setOrigin() {
  OX = W * 0.50;
  OY = H * 0.11;
}

function iso(x, y, z) {
  return {
    sx: OX + (x - y) * ISO,
    sy: OY + (x + y) * ISO * 0.5 - z * ISO * 0.88
  };
}

function shade(hex, p) {
  try {
    var n = parseInt(hex.replace('#',''), 16);
    var f = 1 + p/100;
    var r = Math.max(0, Math.min(255, Math.round((n>>16)*f)));
    var g = Math.max(0, Math.min(255, Math.round(((n>>8)&255)*f)));
    var b = Math.max(0, Math.min(255, Math.round((n&255)*f)));
    return '#' + ((r<<16)|(g<<8)|b).toString(16).padStart(6,'0');
  } catch(e) { return hex; }
}

function isoBox(x,y,z, w,d,h, cT,cF,cR) {
  var dz = h;
  // 8 corners
  var p = [
    iso(x,   y,   z),   iso(x+w, y,   z),
    iso(x+w, y+d, z),   iso(x,   y+d, z),
    iso(x,   y,   z+dz),iso(x+w, y,   z+dz),
    iso(x+w, y+d, z+dz),iso(x,   y+d, z+dz)
  ];
  function face(pts, col) {
    ctx.beginPath();
    pts.forEach(function(i,j){ j?ctx.lineTo(p[i].sx,p[i].sy):ctx.moveTo(p[i].sx,p[i].sy); });
    ctx.closePath();
    ctx.fillStyle = col; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,.18)'; ctx.lineWidth = 0.5; ctx.stroke();
  }
  face([4,5,6,7], cT);   // top
  face([7,6,2,3], cF);   // front
  face([5,6,2,1], cR || shade(cF,-14)); // right
}

// ═══════════════════════════════════════════════════
// ROOM
// ═══════════════════════════════════════════════════
function drawRoom() {
  // Floor — warm light oak planks
  for (var fy = 0; fy < 10; fy++) {
    for (var fx = 0; fx < 14; fx++) {
      var plankRow = Math.floor(fy * 2) % 4;
      var col = plankRow===0 ? '#2a3a52' : plankRow===1 ? '#253448' : plankRow===2 ? '#2e3e58' : '#273650';
      var p0=iso(fx,fy,0),p1=iso(fx+1,fy,0),p2=iso(fx+1,fy+1,0),p3=iso(fx,fy+1,0);
      ctx.beginPath();
      ctx.moveTo(p0.sx,p0.sy); ctx.lineTo(p1.sx,p1.sy);
      ctx.lineTo(p2.sx,p2.sy); ctx.lineTo(p3.sx,p3.sy);
      ctx.closePath(); ctx.fillStyle=col; ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.03)'; ctx.lineWidth=0.5; ctx.stroke();
    }
  }
  
  // North wall
  for (var wx=0; wx<14; wx++) {
    isoBox(wx,0,0, 1,0.08,3.6, '#f2ece0','#e6dece',shade('#e6dece',-5));
  }
  // West wall
  for (var wy=0; wy<10; wy++) {
    isoBox(0,wy,0, 0.08,1,3.6, '#eee8dc','#e2dcd0',shade('#e2dcd0',-5));
  }
  // Windows
  [1.2, 5.2, 9.2].forEach(function(wx) {
    // Glass
    var p0=iso(wx,0,0.5),p1=iso(wx+2.2,0,0.5),p2=iso(wx+2.2,0,2.2),p3=iso(wx,0,2.2);
    ctx.beginPath();
    ctx.moveTo(p0.sx,p0.sy);ctx.lineTo(p1.sx,p1.sy);ctx.lineTo(p2.sx,p2.sy);ctx.lineTo(p3.sx,p3.sy);
    ctx.closePath();
    var g=ctx.createLinearGradient(p3.sx,p3.sy,p0.sx,p0.sy);
    g.addColorStop(0,'rgba(60,100,200,.35)'); g.addColorStop(1,'rgba(40,70,160,.18)');
    ctx.fillStyle=g; ctx.fill();
    ctx.strokeStyle='rgba(140,180,255,.5)'; ctx.lineWidth=1.5; ctx.stroke();
    // Mullion
    var m0=iso(wx+1.1,0,0.5),m1=iso(wx+1.1,0,2.2);
    ctx.beginPath(); ctx.moveTo(m0.sx,m0.sy); ctx.lineTo(m1.sx,m1.sy);
    ctx.strokeStyle='rgba(120,160,240,.35)'; ctx.lineWidth=1; ctx.stroke();
    // Sill
    isoBox(wx-0.05,0,0.44, 2.3,0.05,0.06, '#1e2a42','#162038',shade('#162038',-8));
  });
  // Dado rail — subtle horizontal architectural detail
  for(var dx=0;dx<14;dx++){
    isoBox(dx,0,1.05, 1,0.04,0.06, '#2a3650','#222c44',shade('#222c44',-6));
  }
  // Skirting
  isoBox(0,0,0, 14,0.06,0.1, '#2a3040','#181e2a',shade('#181e2a',-6));
  isoBox(0,0,0, 0.06,10,0.1, '#0c1220',shade('#0c1220',-4),shade('#0c1220',-10));
}

// ═══════════════════════════════════════════════════
// FURNITURE
// ═══════════════════════════════════════════════════
var TX=2.6,TY=1.8,TW=8.4,TD=5.8,TH=0.42;

// Background furniture: whiteboard, credenza, plants (always behind characters)
function drawWhiteboardLogo() {
  // ── Glass whiteboard — professional consultancy style ──────────
  // The whiteboard faces west (x≈0.045), spans y 1.60→5.90, z 0.60→2.18
  // We render everything in 2D transformed to the iso surface

  // Get iso screen coords of 4 corners of the board face
  var TL = iso(0.048, 1.62, 2.14);  // top-left   (high y-low, high z)
  var TR = iso(0.048, 5.88, 2.14);  // top-right  (high y, high z)
  var BL = iso(0.048, 1.62, 0.62);  // bottom-left
  var BR = iso(0.048, 5.88, 0.62);  // bottom-right

  // Board pixel dimensions
  var BW = Math.sqrt(Math.pow(TR.sx-TL.sx,2)+Math.pow(TR.sy-TL.sy,2)); // width along top edge
  var BH = Math.sqrt(Math.pow(BL.sx-TL.sx,2)+Math.pow(BL.sy-TL.sy,2)); // height along left edge

  // Iso surface angle (along the y-axis of world)
  var ang = Math.atan2(TR.sy-TL.sy, TR.sx-TL.sx);

  // Helper: draw at a position on the board surface
  // px,py = 0..1 normalized position on board (0,0=TL, 1,1=BR)
  function boardPt(px, py) {
    // Bilinear interpolation across the 4 corners
    var tx = TL.sx + (TR.sx-TL.sx)*px + (BL.sx-TL.sx)*py + (BR.sx-TR.sx-BL.sx+TL.sx)*px*py;
    var ty = TL.sy + (TR.sy-TL.sy)*px + (BL.sy-TL.sy)*py + (BR.sy-TR.sy-BL.sy+TL.sy)*px*py;
    return {sx:tx, sy:ty};
  }

  // Set up a transform that maps a local 2D canvas to the board surface
  function boardCtx(px, py) {
    // Returns screen coords for a point at normalized position px,py
    return boardPt(px, py);
  }

  // ── Helper to draw a rect on the board surface ─────────────────
  // x,y,w,h all in normalized board coords (0..1)
  function boardRect(x, y, w, h, fillStyle, strokeStyle, sw) {
    var p0=boardPt(x,y), p1=boardPt(x+w,y), p2=boardPt(x+w,y+h), p3=boardPt(x,y+h);
    ctx.beginPath();
    ctx.moveTo(p0.sx,p0.sy); ctx.lineTo(p1.sx,p1.sy);
    ctx.lineTo(p2.sx,p2.sy); ctx.lineTo(p3.sx,p3.sy);
    ctx.closePath();
    if(fillStyle){ctx.fillStyle=fillStyle; ctx.fill();}
    if(strokeStyle){ctx.strokeStyle=strokeStyle; ctx.lineWidth=sw||1; ctx.stroke();}
  }

  // ── Helper to draw text on board surface ───────────────────────
  // bx,by = normalized position of text anchor on board
  // returns a save/translate/rotate context for drawing
  function boardText(bx, by, text, font, color, align) {
    var pt = boardPt(bx, by);
    ctx.save();
    ctx.translate(pt.sx, pt.sy);
    ctx.rotate(ang);
    ctx.font = font;
    ctx.fillStyle = color;
    ctx.textAlign = align||'left';
    ctx.textBaseline = 'top';
    ctx.fillText(text, 0, 0);
    ctx.restore();
  }

  // ── Helper: draw a line on board surface ───────────────────────
  function boardLine(x1,y1,x2,y2, color, lw) {
    var p1=boardPt(x1,y1), p2=boardPt(x2,y2);
    ctx.strokeStyle=color; ctx.lineWidth=lw||1; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(p1.sx,p1.sy); ctx.lineTo(p2.sx,p2.sy); ctx.stroke();
  }

  // ── Scale: BH is the pixel height of board ────────────────────
  var fs = function(frac) { return Math.round(BH * frac) + 'px'; };
  var pad = 0.035; // normalized padding

  // ══════════════════════════════════════════════════════════════
  // GLASS REFLECTION on whiteboard surface
  // ══════════════════════════════════════════════════════════════

function drawLaptop(x, y, tableZ, north) {
  var lw=0.55, ld=0.36, lh=0.018; // base dimensions
  var sh=0.30; // screen height

  // Base / keyboard deck
  isoBox(x, y, tableZ+0.002, lw, ld, lh, '#1a1a1c','#111113','#161618');
  // Keyboard surface texture
  isoBox(x+0.04, y+0.03, tableZ+lh+0.001, lw-0.08, ld-0.06, 0.004, '#222226','#181819','#18181e');
  // Trackpad
  isoBox(x+0.17, y+(north?0.22:0.06), tableZ+lh+0.002, 0.18,0.10, 0.003, '#202024','#161618','#1c1c20');

  // Screen - tilted open toward viewer
  // Screen hinge at back edge
  var hx = x, hy = north ? y : y+ld;
  var screenTilt = 0.28; // how far screen leans back (in z units)
  var screenBack = north ? -0.18 : 0.18; // y offset of screen top

  // Screen panel (simplified as a slightly raised isoBox leaning back)
  // We approximate the tilt by drawing screen as a box slightly behind and above
  var sy = north ? y - 0.05 : y + ld + 0.02;
  var sz = tableZ + lh + 0.02;
  isoBox(x+0.02, sy, sz, lw-0.04, 0.04, sh, '#181818','#101010','#141414');
  // Screen face (the glowing display)
  var sfx = x+0.035, sfy = north ? sy-0.01 : sy+0.03, sfz = sz+0.01;
  isoBox(sfx, sfy, sfz, lw-0.07, 0.02, sh-0.03, '#0a1a28','#061014','#081820');
  // Screen glow - each person has a different tinted screen
  var glowColor = north ?
    (x < TX+2 ? 'rgba(40,80,180,.22)' : x < TX+5 ? 'rgba(30,120,60,.2)' : 'rgba(120,50,30,.18)') :
    (x < TX+2 ? 'rgba(80,30,150,.2)'  : x < TX+5 ? 'rgba(30,80,160,.22)' : 'rgba(0,180,100,.2)');
  isoBox(sfx+0.01, sfy, sfz+0.01, lw-0.09, 0.015, sh-0.05, glowColor, 'rgba(0,0,0,.1)', glowColor);

  // Apple-style logo glow on back of screen (subtle)
  var lop = iso(x+lw/2, north ? sy+0.02 : sy+0.02, sz+sh*0.5);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.beginPath(); ctx.ellipse(lop.sx, lop.sy, 5, 3, 0, 0, Math.PI*2); ctx.fill();
}

    ctx.fillText('Z',15,-44);
  } else {
    // Sitting cat, looking around
    // Body
    ctx.fillStyle=fur;
    ctx.beginPath(); ctx.ellipse(0,-14,13,18,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=furD;
    ctx.beginPath(); ctx.ellipse(0,-14,9,14,0,0,Math.PI*2); ctx.fill();

    ctx.beginPath(); ctx.ellipse(-8,-2,5,4,0.15,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(8,-2,5,4,-0.15,0,Math.PI*2); ctx.fill();
    // Tail
    ctx.strokeStyle=fur; ctx.lineWidth=5.5; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(10,-6); ctx.quadraticCurveTo(22,-2,18,-14); ctx.stroke();
    ctx.strokeStyle=furD; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(10,-6); ctx.quadraticCurveTo(21,-2,17,-14); ctx.stroke();
    // Head - slight bob
    var hb=Math.sin(t*1.2)*1.5;
    ctx.fillStyle=fur;
    ctx.beginPath(); ctx.ellipse(0,-34+hb,12,11,0,0,Math.PI*2); ctx.fill();
    // Ears
    ctx.fillStyle=fur;
    ctx.beginPath(); ctx.moveTo(-12,-42+hb); ctx.lineTo(-7,-32+hb); ctx.lineTo(-2,-42+hb); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(2,-42+hb); ctx.lineTo(7,-32+hb); ctx.lineTo(12,-42+hb); ctx.closePath(); ctx.fill();
    ctx.fillStyle=isBlack?'#4a1a2a':'#e8a0b0';
    ctx.beginPath(); ctx.moveTo(-11,-41+hb); ctx.lineTo(-7,-33+hb); ctx.lineTo(-3,-41+hb); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(3,-41+hb); ctx.lineTo(7,-33+hb); ctx.lineTo(11,-41+hb); ctx.closePath(); ctx.fill();
    // Eyes
    ctx.fillStyle='#f0f0e8';
    ctx.beginPath(); ctx.ellipse(-5,-34+hb,4,4,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5,-34+hb,4,4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle=eyeC;
    ctx.beginPath(); ctx.ellipse(-5,-34+hb,2.5,2.5,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5,-34+hb,2.5,2.5,0,0,Math.PI*2); ctx.fill();

    ctx.beginPath(); ctx.ellipse(-5,-34+hb,1.4,1.4,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5,-34+hb,1.4,1.4,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.8)';
    ctx.beginPath(); ctx.ellipse(-4.2,-34.8+hb,.8,.8,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(5.8,-34.8+hb,.8,.8,0,0,Math.PI*2); ctx.fill();
    // Nose
    ctx.fillStyle=nose;
    ctx.beginPath(); ctx.moveTo(0,-31+hb); ctx.lineTo(-2,-28.5+hb); ctx.lineTo(2,-28.5+hb); ctx.closePath(); ctx.fill();
    // Mouth
    ctx.strokeStyle=isBlack?'#808080':'#888878'; ctx.lineWidth=1; ctx.lineCap='round';
    ctx.beginPath(); ctx.moveTo(-3,-28+hb); ctx.lineTo(-5,-26+hb); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(3,-28+hb); ctx.lineTo(5,-26+hb); ctx.stroke();
    // Whiskers
    ctx.strokeStyle=isBlack?'rgba(255,255,255,.5)':'rgba(80,80,80,.35)'; ctx.lineWidth=1;
    [[-14,-30,-6,-29],[-14,-28,-6,-28],[-14,-26,-6,-27]].forEach(function(w){
      ctx.beginPath(); ctx.moveTo(w[0],w[1]+hb); ctx.lineTo(w[2],w[3]+hb); ctx.stroke();
    });
    [[14,-30,6,-29],[14,-28,6,-28],[14,-26,6,-27]].forEach(function(w){
      ctx.beginPath(); ctx.moveTo(w[0],w[1]+hb); ctx.lineTo(w[2],w[3]+hb); ctx.stroke();
    });
  }

  // White patch on black cat chest
  if(isBlack&&!sleeping){
    ctx.fillStyle='rgba(255,255,255,.15)';
    ctx.beginPath(); ctx.ellipse(0,-14,5,8,0,0,Math.PI*2); ctx.fill();
  }

  ctx.restore();
}

function drawChair(x,y,side) {
  var leather='#2c1a0e', leatherD='#1e1008', leatherH='#3a2414';
  var chrome='#909090', chromeD='#606060', chromeL='#b8b8b8';
  var cw=.88, cd=.72, ch=.78;
  var cx=x+cw/2, cy=y+cd/2;

  // ── 5-star base on floor ──────────────────────────────────────
  for(var ai=0;ai<5;ai++){
    var a5=(ai*72-90)*Math.PI/180;
    var bx=cx+Math.cos(a5)*.30-.03, by=cy+Math.sin(a5)*.30-.03;
    isoBox(bx,by,0, .06,.06,.025, chromeL,chrome,chromeD);
  }
  // Center hub
  isoBox(cx-.07,cy-.07,0, .14,.14,.04, chromeL,chrome,chromeD);
  // Pneumatic cylinder
  isoBox(cx-.04,cy-.04,.04, .08,.08,ch-.18, chrome,chromeD,shade(chromeD,-10));

  // ── Seat ──────────────────────────────────────────────────────
  isoBox(x+.04,y+.04,ch-.12, cw-.08,cd-.08,.14, leatherH,leather,leatherD);
  isoBox(x+.08,y+.08,ch+.02, cw-.16,cd-.16,.04, shade(leatherH,10),leatherH,shade(leatherH,-4));

  // ── Armrests ──────────────────────────────────────────────────
  isoBox(x+.03,y+.08,ch+.02, .09,cd-.18,.26, chrome,chromeD,shade(chromeD,-8));
  isoBox(x+cw-.12,y+.08,ch+.02, .09,cd-.18,.26, chrome,chromeD,shade(chromeD,-8));
  isoBox(x+.02,y+.08,ch+.26, .11,cd-.18,.04, leatherH,leather,leatherD);
  isoBox(x+cw-.13,y+.08,ch+.26, .11,cd-.18,.04, leatherH,leather,leatherD);

  // ── Backrest ──────────────────────────────────────────────────
  var bz=side==='n'?y+.01:y+cd-.13;
  // Chrome frame sides
  isoBox(x+.06,bz+(side==='n'?.01:.04),ch+.04, .06,.10,.72, chromeL,chrome,chromeD);
  isoBox(x+cw-.12,bz+(side==='n'?.01:.04),ch+.04, .06,.10,.72, chromeL,chrome,chromeD);
  // Leather pad
  isoBox(x+.10,bz+(side==='n'?.02:.05),ch+.06, cw-.20,.07,.66, leatherH,leather,leatherD);
  isoBox(x+.13,bz+(side==='n'?.02:.05),ch+.10, cw-.26,.05,.58, shade(leatherH,8),leatherH,leather);
  // Headrest
  isoBox(x+.16,bz+(side==='n'?.02:.06),ch+.76, cw-.32,.08,.18, shade(leatherH,12),leatherH,leatherD);
}

function drawPlant(x,y,sc) {
  // ── Premium architectural planter: Fiddle Leaf Fig style ──────
  // Low square marble/stone planter
  var pw=.65*sc, pd=.65*sc, ph=.20*sc;
  // Outer planter — light stone/marble
  isoBox(x,y,0, pw,pd,ph, '#d8d2c8','#c4beb2',shade('#c4beb2',-8));
  // Inner rim — darker groove
  isoBox(x+.06*sc,y+.06*sc,ph-.02, pw-.12*sc,pd-.12*sc,.05*sc, '#b8b0a4','#a8a096','#b0a89c');
  // Soil — dark moist earth
  isoBox(x+.08*sc,y+.08*sc,ph+.01, pw-.16*sc,pd-.16*sc,.02*sc, '#2a1e14','#1e160e','#241a10');

  var cx=x+pw/2, cy=y+pd/2, base=ph+.03*sc;

  // ── TRUNK — single elegant stem, slight lean ─────────────────
  var trunkW=.06*sc;
  isoBox(cx-trunkW/2, cy-trunkW/2, base, trunkW,trunkW, .80*sc, '#5c3d20','#3e2810','#4e3218');
  // Bark texture stripe
  isoBox(cx-trunkW/2+.01*sc, cy-trunkW/2, base, .01*sc, trunkW, .80*sc, 'rgba(255,255,255,.08)','rgba(255,255,255,.04)','rgba(255,255,255,.06)');

  // ── FIDDLE LEAF FIG — large dramatic leaves ──────────────────
  // Each leaf: position offset, size, angle, color variation
  var leaves = [
    {ox:-.05,oy:-.10,h:.52,rx:.17,ry:.12,rot:-.18,col:'#3a7a42',dark:'#2a5e30'},
    {ox: .10,oy:-.05,h:.66,rx:.20,ry:.14,rot: .14,col:'#2e6e38',dark:'#1e5228'},
    {ox:-.14,oy: .07,h:.46,rx:.16,ry:.11,rot:-.28,col:'#3e8048',dark:'#2c6035'},
    {ox: .05,oy: .12,h:.70,rx:.22,ry:.15,rot: .08,col:'#326c3c',dark:'#205028'},
    {ox:-.07,oy: .00,h:.80,rx:.19,ry:.13,rot:-.06,col:'#387640',dark:'#285a30'},
    {ox: .16,oy: .03,h:.54,rx:.15,ry:.10,rot: .22,col:'#2a6234',dark:'#1c4824'},
  ];

  leaves.forEach(function(lf) {
    var lx = cx + lf.ox*sc;
    var ly = cy + lf.oy*sc;
    var lz = base + lf.h*sc;
    var lp = iso(lx, ly, lz);

    ctx.save();
    ctx.translate(lp.sx, lp.sy);

    // Leaf body — oval shape drawn as ellipse at iso angle
    var isoAng = Math.atan2(
      iso(lx+.1,ly,lz).sy - lp.sy,
      iso(lx+.1,ly,lz).sx - lp.sx
    );
    ctx.rotate(isoAng + lf.rot);

    var rw = lf.rx * sc * 56, rh = lf.ry * sc * 56;

    // Leaf shadow
    ctx.fillStyle = 'rgba(0,0,0,.12)';
    ctx.beginPath(); ctx.ellipse(2, 2, rw, rh, 0, 0, Math.PI*2); ctx.fill();

    // Leaf body gradient
    var lg = ctx.createRadialGradient(-rw*.2, -rh*.3, rh*.1, 0, 0, Math.max(rw,rh));
    lg.addColorStop(0, shade(lf.col, 18));
    lg.addColorStop(.5, lf.col);
    lg.addColorStop(1, lf.dark);
    ctx.fillStyle = lg;
    ctx.beginPath(); ctx.ellipse(0, 0, rw, rh, 0, 0, Math.PI*2); ctx.fill();

    // Central vein — light
    ctx.strokeStyle = 'rgba(255,255,255,.22)';
    ctx.lineWidth = 1.4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(0, rh*.85); ctx.lineTo(0, -rh*.85); ctx.stroke();

    // Side veins
    ctx.strokeStyle = 'rgba(255,255,255,.10)';
    ctx.lineWidth = 0.8;
    [-0.5,-0.25,0.25,0.5].forEach(function(v) {
      ctx.beginPath();
      ctx.moveTo(0, v*rh);
      ctx.lineTo(rw*.7, v*rh - rh*.1);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, v*rh);
      ctx.lineTo(-rw*.7, v*rh - rh*.1);
      ctx.stroke();
    });

    // Leaf edge highlight
    ctx.strokeStyle = shade(lf.col, 12) + '60';
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.ellipse(0, 0, rw, rh, 0, 0, Math.PI*2); ctx.stroke();

    ctx.restore();
  });

  // Ambient shadow under planter
  var shPos = iso(cx, cy+pd*.2, 0.01);
  ctx.save(); ctx.globalAlpha = .10;
  ctx.beginPath(); ctx.ellipse(shPos.sx, shPos.sy+5, 32*sc, 9*sc, 0, 0, Math.PI*2);
  ctx.fillStyle = '#000'; ctx.fill(); ctx.restore();
}

var catMoving = false; // only one moves at a time

// Schedule 4 total moves at random times between 20-120s
var catMoveQueue = [];
(function scheduleCats(){
  var times = [];
  // 4 moves at well-spaced random moments
  var used = {};
  while(times.length < 4){
    var t2 = 20 + Math.floor(Math.random()*90);
    if(!used[t2]){used[t2]=true;times.push(t2);}
  }
  times.sort(function(a,b){return a-b;});
  // Alternate between cats: black, white, black, white
  times.forEach(function(t3,i){
    catMoveQueue.push({time:t3, cat:i%2===0?'black':'white'});
  });
})();

function updateCats(t){
  // Smooth movement
  catBlack.x += (catBlack.tx-catBlack.x)*0.012;
  catBlack.y += (catBlack.ty-catBlack.y)*0.012;
  catWhite.x += (catWhite.tx-catWhite.x)*0.012;
  catWhite.y += (catWhite.ty-catWhite.y)*0.012;

  // Check queue
  var ti = Math.floor(t);
  if(catMoveQueue.length>0 && ti>=catMoveQueue[0].time && !catMoving){
    var move = catMoveQueue.shift();
    catMoving = true;
    if(move.cat==='black' && catBlack.moves<4){
      catBlack.moves++;
      catBlack.spotIdx = (catBlack.spotIdx+1) % catSpotsBlack.length;
      var sp=catSpotsBlack[catBlack.spotIdx];
      catBlack.tx=sp.x; catBlack.ty=sp.y;
      catBlack.sleeping=false;
      setTimeout(function(){catBlack.sleeping=sp.sleep; catMoving=false;},4000);
    } else if(move.cat==='white' && catWhite.moves<4){
      catWhite.moves++;
      catWhite.spotIdx = (catWhite.spotIdx+1) % catSpotsWhite.length;
      var sp2=catSpotsWhite[catWhite.spotIdx];
      catWhite.tx=sp2.x; catWhite.ty=sp2.y;
      catWhite.sleeping=false;
      setTimeout(function(){catWhite.sleeping=sp2.sleep; catMoving=false;},4000);
    } else {
      catMoving=false;
    }
  }
}

  var hCy=nTop-hH2;
  var hg=ctx.createRadialGradient(-3,hCy-3,2,0,hCy,hH2);
  hg.addColorStop(0,shade(d.skin,12)); hg.addColorStop(.6,d.skin); hg.addColorStop(1,shade(d.skin,-18));
  ctx.fillStyle=hg;
  ctx.beginPath(); ctx.ellipse(0,hCy,hW,hH2,0,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='rgba(0,0,0,.07)'; ctx.lineWidth=.6; ctx.stroke();
  ctx.fillStyle=shade(d.skin,-10)+'38';
  ctx.beginPath(); ctx.ellipse(0,hCy+hH2*.72,hW*.82,hH2*.22,0,0,Math.PI*2); ctx.fill();
  if(isF){
    ctx.fillStyle='rgba(220,100,118,.1)';

    ctx.beginPath(); ctx.ellipse(hW*.55,hCy+hH2*.28,hW*.3,hH2*.18,0,0,Math.PI*2); ctx.fill();
  }

  // hair
  var hC=d.hairGrey?'#8a8070':d.hair;
  ctx.fillStyle=hC;
  if(isF){
    ctx.beginPath(); ctx.ellipse(0,hCy-hH2*.55,hW*1.05,hH2*.55,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(-hW*1.05,hCy,5,hH2*.75,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(hW*1.05,hCy,5,hH2*.75,0,0,Math.PI*2); ctx.fill();
    if(d.hairGrey){
      ctx.strokeStyle='rgba(210,205,195,.5)'; ctx.lineWidth=1.8;
      ctx.beginPath(); ctx.moveTo(-4,hCy-hH2); ctx.lineTo(-5,hCy+hH2*.3); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(5,hCy-hH2); ctx.lineTo(6,hCy+hH2*.2); ctx.stroke();
    }
  } else {
    ctx.beginPath(); ctx.ellipse(0,hCy-hH2*.6,hW*1.02,hH2*.48,0,0,Math.PI*2); ctx.fill();
    ctx.fillRect(-hW,hCy-hH2*.6,hW*2,hH2*.35);
    if(d.age==='senior'){
      ctx.fillStyle='rgba(200,200,190,.42)';
      ctx.beginPath(); ctx.ellipse(-hW*.92,hCy-hH2*.05,4,6,0,0,Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(hW*.92,hCy-hH2*.05,4,6,0,0,Math.PI*2); ctx.fill();
    }
  }
  if(d.beard){
    ctx.fillStyle=shade(d.hair,-5)+'b0';
    ctx.beginPath();
    ctx.moveTo(-hW*.72,hCy+hH2*.55); ctx.quadraticCurveTo(0,hCy+hH2*1.05,hW*.72,hCy+hH2*.55);
    ctx.quadraticCurveTo(hW*.82,hCy+hH2*.4,0,hCy+hH2*.5);
    ctx.quadraticCurveTo(-hW*.82,hCy+hH2*.4,-hW*.72,hCy+hH2*.55); ctx.fill();
  }
  if(d.freckles){
    ctx.fillStyle='rgba(160,75,25,.2)';
    [[-7,hCy-1],[-12,hCy-5],[7,hCy],[13,hCy-4],[-4,hCy+5],[4,hCy+4]].forEach(function(fp){
      ctx.beginPath(); ctx.ellipse(fp[0],fp[1],2.2,1.8,0,0,Math.PI*2); ctx.fill();
    });
  }

  // eyes
  var eyY=hCy-hH2*.12, eyX=hW*.42;
  ctx.fillStyle='rgba(0,0,0,.06)';
  ctx.beginPath(); ctx.ellipse(-eyX,eyY-5,7,3,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(eyX,eyY-5,7,3,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#f5f1ed';
  ctx.beginPath(); ctx.ellipse(-eyX,eyY,7,5,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(eyX,eyY,7,5,0,0,Math.PI*2); ctx.fill();
  function iris(ex){
    var ig=ctx.createRadialGradient(ex,eyY,0,ex,eyY,4.5);
    ig.addColorStop(0,shade(d.eye,25)); ig.addColorStop(1,d.eye);
    ctx.fillStyle=ig; ctx.beginPath(); ctx.ellipse(ex,eyY,4.5,4.5,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#030508'; ctx.beginPath(); ctx.ellipse(ex,eyY,2.8,2.8,0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.85)'; ctx.beginPath(); ctx.ellipse(ex-1.2,eyY-1.4,1.5,1.5,0,0,Math.PI*2); ctx.fill();
  }
  iris(-eyX); iris(eyX);
  ctx.strokeStyle='rgba(0,0,0,.22)'; ctx.lineWidth=1.1; ctx.lineCap='round';
  ctx.beginPath(); ctx.arc(-eyX,eyY,7,Math.PI+.35,-.35); ctx.stroke();
  ctx.beginPath(); ctx.arc(eyX,eyY,7,Math.PI+.35,-.35); ctx.stroke();
  if(d.wrinkles){
    ctx.strokeStyle=shade(d.skin,-18)+'55'; ctx.lineWidth=.9;
    [1,2].forEach(function(i){
      ctx.beginPath(); ctx.moveTo(-eyX-7,eyY-1+i*2); ctx.lineTo(-eyX-12,eyY-3+i*2.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(eyX+7,eyY-1+i*2); ctx.lineTo(eyX+12,eyY-3+i*2.5); ctx.stroke();
    });
    ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-8,hCy-hH2*.6); ctx.quadraticCurveTo(0,hCy-hH2*.62,8,hCy-hH2*.6); ctx.stroke();
  }
  if(isF){
    ctx.strokeStyle=shade(d.hair,-10); ctx.lineWidth=1.4;
    [-2.5,-.5,1.5,3].forEach(function(o){
      ctx.beginPath(); ctx.moveTo(-eyX+o,eyY-4.5); ctx.lineTo(-eyX+o*1.15,eyY-7.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(eyX+o,eyY-4.5); ctx.lineTo(eyX+o*1.15,eyY-7.5); ctx.stroke();
    });
  }
  ctx.strokeStyle=hC; ctx.lineWidth=isF?1.8:2.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-eyX-6,eyY-9); ctx.quadraticCurveTo(-eyX,eyY-(isF?13:12),-eyX+5,eyY-9); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(eyX-5,eyY-9); ctx.quadraticCurveTo(eyX,eyY-(isF?13:12),eyX+6,eyY-9); ctx.stroke();
  if(d.glasses){
    ctx.strokeStyle='#445566'; ctx.lineWidth=1.9;
    ctx.beginPath(); ctx.arc(-eyX,eyY,8.5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(eyX,eyY,8.5,0,Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-eyX+8.5,eyY); ctx.lineTo(eyX-8.5,eyY); ctx.stroke();
    ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(-eyX-8.5,eyY); ctx.lineTo(-eyX-14,eyY-2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eyX+8.5,eyY); ctx.lineTo(eyX+14,eyY-2); ctx.stroke();
  }
  var nY=hCy+hH2*.2;
  ctx.strokeStyle=shade(d.skin,-24); ctx.lineWidth=1.2; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-3.5,nY-5); ctx.lineTo(0,nY+1); ctx.lineTo(3.5,nY-5); ctx.stroke();
  ctx.fillStyle=shade(d.skin,-20);
  ctx.beginPath(); ctx.ellipse(-4.8,nY+.5,3.2,2,-.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(4.8,nY+.5,3.2,2,.3,0,Math.PI*2); ctx.fill();
  var mY=hCy+hH2*.52; ctx.lineCap='round';
  if(isF){
    ctx.fillStyle='rgba(190,78,98,.48)';
    ctx.beginPath(); ctx.moveTo(-7,mY); ctx.quadraticCurveTo(-3,mY-3,0,mY); ctx.quadraticCurveTo(3,mY-3,7,mY); ctx.quadraticCurveTo(4.5,mY+5.5,0,mY+6.5); ctx.quadraticCurveTo(-4.5,mY+5.5,-7,mY); ctx.fill();
    ctx.strokeStyle='rgba(148,58,78,.5)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-7,mY); ctx.quadraticCurveTo(0,mY-3,7,mY); ctx.stroke();
  } else {
    ctx.strokeStyle=shade(d.skin,-28); ctx.lineWidth=1.7;
    ctx.beginPath(); ctx.moveTo(-6.5,mY); ctx.quadraticCurveTo(0,mY+(isActive?5:3),6.5,mY); ctx.stroke();
    ctx.fillStyle=shade(d.skin,-18)+'45';
    ctx.beginPath(); ctx.ellipse(0,mY+1.5,6.5,2,0,0,Math.PI*2); ctx.fill();
  }
  if(id==='sophie'){
    var pY = bTop + 4;
    [-6.5, 0, 6.5].forEach(function(px){
      ctx.fillStyle='#f5f2ee';
      ctx.beginPath(); ctx.arc(px, pY, 3.8, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,.1)'; ctx.lineWidth=0.5; ctx.stroke();
      ctx.fillStyle='rgba(255,255,255,.55)';
      ctx.beginPath(); ctx.arc(px-1, pY-1, 1.2, 0, Math.PI*2); ctx.fill();
    });
  }
  if(isActive){
    var wr=28+Math.sin(t*7)*4;
    ctx.strokeStyle='rgba(34,197,94,.3)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,hCy-hH2-12,wr,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle='rgba(34,197,94,.12)'; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.arc(0,hCy-hH2-12,wr+12,0,Math.PI*2); ctx.stroke();
  }
  drawNameplate(0,hCy-hH2-26,d);
}

// ─── DRAW ROBOT - modern AI agent design ──────────
function drawRobot(d,isActive,t) {
  var p  = 0.5 + 0.5*Math.sin(t*1.6);           // slow pulse
  var p2 = 0.5 + 0.5*Math.sin(t*3.2+1);          // fast pulse
  var aS = isActive ? Math.sin(t*2.6)*5 : 0;     // arm swing
  var G  = 'rgba(0,255,140,';                      // neon green

  // ── SHADOW ─────────────────────────────────────
  ctx.save(); ctx.scale(1,0.26);
  ctx.beginPath(); ctx.ellipse(0,0,20,20,0,0,Math.PI*2);
  var sg = ctx.createRadialGradient(0,0,4,0,0,20);
  sg.addColorStop(0,'rgba(0,255,140,0.18)'); sg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle = sg; ctx.fill(); ctx.restore();

  // ── FEET – magnetic hover pads ──────────────────
  [[-10,-2],[10,-2]].forEach(function(fp,i){
    // Pad base
    var fG = ctx.createLinearGradient(fp[0]-10,fp[1]-4,fp[0]+10,fp[1]+4);
    fG.addColorStop(0,'#0a1a22'); fG.addColorStop(1,'#06121a');
    ctx.fillStyle = fG;
    ctx.beginPath(); ctx.roundRect(fp[0]-10,fp[1]-4,20,8,4); ctx.fill();
    // Neon edge
    ctx.strokeStyle = G+(0.5+0.3*p)+')'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.roundRect(fp[0]-10,fp[1]-4,20,8,4); ctx.stroke();
    // Hover glow underneath
    ctx.fillStyle = G+0.12+')';
    ctx.beginPath(); ctx.ellipse(fp[0],fp[1]+5,10,3,0,0,Math.PI*2); ctx.fill();
  });

  // ── LEGS – exoskeleton panels ───────────────────
  [[-12,-38],[2,-38]].forEach(function(lp,i){
    var lG = ctx.createLinearGradient(lp[0],lp[1],lp[0]+10,lp[1]+38);
    lG.addColorStop(0,'#0c1c28'); lG.addColorStop(0.5,'#081420'); lG.addColorStop(1,'#040e18');
    ctx.fillStyle = lG;
    ctx.beginPath(); ctx.roundRect(lp[0],lp[1],13,38,3); ctx.fill();
    // Outer edge highlight
    ctx.strokeStyle = G+0.25+')'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(lp[0],lp[1],13,38,3); ctx.stroke();
    // Inner panel groove
    ctx.strokeStyle = 'rgba(0,0,0,0.5)'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.roundRect(lp[0]+2,lp[1]+4,9,30,2); ctx.stroke();
    // Accent stripe
    ctx.fillStyle = G+(0.12+0.08*p)+')';
    ctx.beginPath(); ctx.roundRect(lp[0]+3,lp[1]+5,3,28,1.5); ctx.fill();
    // Knee ring
    ctx.strokeStyle = G+(0.4+0.2*p)+')'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.roundRect(lp[0]-1,lp[1]+15,15,5,2); ctx.stroke();
  });

  // ── ARMS – biomech linkage ──────────────────────
  [
    {sx:-13,sy:-88, ex:-25,ey:-50, swing:aS,  hx:-29,hy:-55},
    {sx: 13,sy:-88, ex: 25,ey:-50, swing:-aS, hx: 26,hy:-55}
  ].forEach(function(arm){
    var aG = ctx.createLinearGradient(arm.sx,arm.sy,arm.ex,arm.ey+arm.swing);
    aG.addColorStop(0,'#0e1e2c'); aG.addColorStop(1,'#060e18');
    ctx.fillStyle = aG;
    ctx.beginPath();
    ctx.moveTo(arm.sx, arm.sy);
    ctx.lineTo(arm.ex-3, arm.sy+6);
    ctx.lineTo(arm.ex, arm.ey+arm.swing);
    ctx.lineTo(arm.sx-Math.sign(arm.sx)*2, arm.ey+arm.swing+6);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = G+0.2+')'; ctx.lineWidth=1; ctx.stroke();
    // Elbow joint circle
    ctx.fillStyle = '#060e18';
    ctx.beginPath(); ctx.arc(arm.ex, (arm.sy+arm.ey)/2+arm.swing/2, 4,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle = G+0.45+')'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.arc(arm.ex, (arm.sy+arm.ey)/2+arm.swing/2, 4,0,Math.PI*2); ctx.stroke();
    // Hand – tri-claw gripper
    ctx.fillStyle = '#080e18';
    ctx.beginPath(); ctx.roundRect(arm.hx-5, arm.hy+arm.swing-2, 10, 10, 3); ctx.fill();
    ctx.strokeStyle = G+0.5+')'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.roundRect(arm.hx-5, arm.hy+arm.swing-2, 10, 10, 3); ctx.stroke();
    // Claw tips
    ctx.strokeStyle = G+0.7+')'; ctx.lineWidth=1;
    [-3,0,3].forEach(function(cx){
      ctx.beginPath(); ctx.moveTo(arm.hx+cx, arm.hy+arm.swing-2);
      ctx.lineTo(arm.hx+cx, arm.hy+arm.swing-7); ctx.stroke();
    });
  });

  // ── TORSO – angular chassis ─────────────────────
  // Main body with chamfered corners
  var tG = ctx.createLinearGradient(-22,-98,22,-38);
  tG.addColorStop(0,'#0e1e2e'); tG.addColorStop(0.3,'#0c1c2c');
  tG.addColorStop(0.7,'#08141e'); tG.addColorStop(1,'#040c14');
  ctx.fillStyle = tG;
  ctx.beginPath();
  ctx.moveTo(-18,-98); ctx.lineTo(18,-98);   // top
  ctx.lineTo(22,-92);                          // top-right bevel
  ctx.lineTo(22,-44);                          // right side
  ctx.lineTo(18,-38);                          // bottom-right bevel
  ctx.lineTo(-18,-38);                         // bottom
  ctx.lineTo(-22,-44);                         // bottom-left bevel
  ctx.lineTo(-22,-92);                         // left side
  ctx.lineTo(-18,-98);                         // top-left bevel
  ctx.closePath(); ctx.fill();

  // Torso border
  ctx.strokeStyle = G+(0.25+0.12*p)+')'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(-18,-98); ctx.lineTo(18,-98);
  ctx.lineTo(22,-92); ctx.lineTo(22,-44); ctx.lineTo(18,-38);
  ctx.lineTo(-18,-38); ctx.lineTo(-22,-44); ctx.lineTo(-22,-92);
  ctx.closePath(); ctx.stroke();

  // Shoulder accent lines
  ctx.strokeStyle = G+0.35+')'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(-22,-88); ctx.lineTo(-14,-88); ctx.stroke();
  ctx.beginPath(); ctx.moveTo( 22,-88); ctx.lineTo( 14,-88); ctx.stroke();

  // Center chest panel – recessed
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.moveTo(-14,-94); ctx.lineTo(14,-94);
  ctx.lineTo(16,-90); ctx.lineTo(16,-44); ctx.lineTo(14,-42);
  ctx.lineTo(-14,-42); ctx.lineTo(-16,-44); ctx.lineTo(-16,-90);
  ctx.closePath(); ctx.fill();

  // Arc reactor core
  var ar = 7, arY = -70;
  var arcG = ctx.createRadialGradient(0,arY,1,0,arY,ar+6);
  arcG.addColorStop(0,'rgba(0,255,140,0.9)');
  arcG.addColorStop(0.4,'rgba(0,255,140,0.35)');
  arcG.addColorStop(0.7,'rgba(0,255,140,0.12)');
  arcG.addColorStop(1,'rgba(0,255,140,0)');
  ctx.fillStyle = arcG;
  ctx.beginPath(); ctx.arc(0,arY,ar+6,0,Math.PI*2); ctx.fill();
  // Core ring
  ctx.strokeStyle = G+(0.7+0.3*p)+')'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.arc(0,arY,ar,0,Math.PI*2); ctx.stroke();
  // Core center
  var cG = ctx.createRadialGradient(0,arY,0,0,arY,ar);
  cG.addColorStop(0,'rgba(255,255,255,0.95)');
  cG.addColorStop(0.3,'rgba(0,255,140,0.9)');
  cG.addColorStop(1,'rgba(0,255,140,0.2)');
  ctx.fillStyle = cG;
  ctx.beginPath(); ctx.arc(0,arY,ar-1,0,Math.PI*2); ctx.fill();
  // Hex pattern around core
  for(var hi=0;hi<6;hi++){
    var ha=hi*Math.PI/3, hr=ar+3;
    var hx=Math.cos(ha)*hr, hy2=Math.sin(ha)*hr+arY;
    ctx.fillStyle = G+(0.3+0.2*p)+')';
    ctx.beginPath(); ctx.arc(hx,hy2,1.5,0,Math.PI*2); ctx.fill();
  }

  // Data grid lines
  ctx.strokeStyle = G+0.06+')'; ctx.lineWidth=0.6;
  for(var gi=-12;gi<=12;gi+=6){
    ctx.beginPath(); ctx.moveTo(gi,-92); ctx.lineTo(gi,-44); ctx.stroke();
  }
  for(var gj=-90;gj>=-46;gj+=8){
    ctx.beginPath(); ctx.moveTo(-14,gj); ctx.lineTo(14,gj); ctx.stroke();
  }

  // Side vents
  [-20,20].forEach(function(vx){
    [0,1,2].forEach(function(vi){
      ctx.fillStyle = G+0.15+')';
      ctx.beginPath(); ctx.roundRect(vx<0?-22:18,-84+vi*7,4,4,1); ctx.fill();
    });
  });

  // ── NECK – cable bundle ─────────────────────────
  ctx.fillStyle = '#060e18';
  ctx.beginPath(); ctx.roundRect(-7,-104,14,8,3); ctx.fill();
  ctx.strokeStyle = G+0.3+')'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.roundRect(-7,-104,14,8,3); ctx.stroke();
  // Cables
  [-4,-1,2].forEach(function(cx){
    ctx.strokeStyle = G+0.2+')'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(cx,-98); ctx.lineTo(cx,-104); ctx.stroke();
  });

  // ── HEAD – sleek angular helmet ─────────────────
  var hG = ctx.createLinearGradient(-26,-178,26,-102);
  hG.addColorStop(0,'#101e2e'); hG.addColorStop(0.4,'#0c1a28');
  hG.addColorStop(0.8,'#081420'); hG.addColorStop(1,'#040c14');
  ctx.fillStyle = hG;
  // Angular head shape
  ctx.beginPath();
  ctx.moveTo(-16,-178); ctx.lineTo(16,-178);   // top flat
  ctx.lineTo(22,-170);                           // top-right bevel
  ctx.lineTo(26,-140);                           // cheekbone flare
  ctx.lineTo(22,-104);                           // jaw right
  ctx.lineTo(-22,-104);                          // jaw bottom
  ctx.lineTo(-26,-140);                          // cheekbone left
  ctx.lineTo(-22,-170);                          // top-left bevel
  ctx.closePath(); ctx.fill();

  // Head border
  ctx.strokeStyle = G+(0.28+0.15*p)+')'; ctx.lineWidth=1.8;
  ctx.beginPath();
  ctx.moveTo(-16,-178); ctx.lineTo(16,-178);
  ctx.lineTo(22,-170); ctx.lineTo(26,-140); ctx.lineTo(22,-104);
  ctx.lineTo(-22,-104); ctx.lineTo(-26,-140); ctx.lineTo(-22,-170);
  ctx.closePath(); ctx.stroke();

  // Forehead accent plate
  ctx.fillStyle = 'rgba(0,255,140,0.06)';
  ctx.beginPath();
  ctx.moveTo(-12,-178); ctx.lineTo(12,-178); ctx.lineTo(18,-168);
  ctx.lineTo(-18,-168); ctx.closePath(); ctx.fill();
  ctx.strokeStyle = G+0.2+')'; ctx.lineWidth=0.8;
  ctx.beginPath();
  ctx.moveTo(-12,-178); ctx.lineTo(12,-178); ctx.lineTo(18,-168);
  ctx.lineTo(-18,-168); ctx.closePath(); ctx.stroke();

  // ── VISOR – panoramic one-piece ─────────────────
  ctx.fillStyle = '#010808';
  ctx.beginPath();
  ctx.moveTo(-22,-165); ctx.lineTo(22,-165);
  ctx.lineTo(24,-157); ctx.lineTo(24,-120); ctx.lineTo(22,-114);
  ctx.lineTo(-22,-114); ctx.lineTo(-24,-120); ctx.lineTo(-24,-157);
  ctx.closePath(); ctx.fill();

  // Visor gradient sheen
  var vshG = ctx.createLinearGradient(-24,-165,24,-114);
  vshG.addColorStop(0,'rgba(0,255,140,0.08)');
  vshG.addColorStop(0.4,'rgba(0,255,140,0.03)');
  vshG.addColorStop(1,'rgba(0,255,140,0.06)');
  ctx.fillStyle = vshG;
  ctx.beginPath();
  ctx.moveTo(-22,-165); ctx.lineTo(22,-165);
  ctx.lineTo(24,-157); ctx.lineTo(24,-120); ctx.lineTo(22,-114);
  ctx.lineTo(-22,-114); ctx.lineTo(-24,-120); ctx.lineTo(-24,-157);
  ctx.closePath(); ctx.fill();
  // Visor border glow
  ctx.strokeStyle = G+(0.45+0.25*p)+')'; ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.moveTo(-22,-165); ctx.lineTo(22,-165);
  ctx.lineTo(24,-157); ctx.lineTo(24,-120); ctx.lineTo(22,-114);
  ctx.lineTo(-22,-114); ctx.lineTo(-24,-120); ctx.lineTo(-24,-157);
  ctx.closePath(); ctx.stroke();

  // Visor reflection streak
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.beginPath();
  ctx.moveTo(-20,-163); ctx.lineTo(-4,-163); ctx.lineTo(-6,-116); ctx.lineTo(-22,-116);
  ctx.closePath(); ctx.fill();

  // ── EYES – dynamic displays ──────────────────────
  if(isActive){
    // Speaking: EQ waveform
    [-1,1].forEach(function(side){
      var eyeCx = side * 10;
      ctx.strokeStyle = G+(0.8+0.2*p2)+')'; ctx.lineWidth=2; ctx.lineCap='round';
      ctx.beginPath();
      for(var xi=0; xi<=12; xi+=2){
        var wave = Math.sin(t*10 + xi*0.7 * side) * (3 + 2*p2);
        var px2 = eyeCx - 6 + xi;
        var py2 = -142 + wave;
        xi===0 ? ctx.moveTo(px2,py2) : ctx.lineTo(px2,py2);
      }
      ctx.stroke();
      // Glow behind waveform
      ctx.strokeStyle = G+0.15+')'; ctx.lineWidth=6;
      ctx.beginPath();
      for(var xi2=0; xi2<=12; xi2+=2){
        var wave2 = Math.sin(t*10 + xi2*0.7*side) * (3+2*p2);
        var px3 = eyeCx - 6 + xi2;
        var py3 = -142 + wave2;
        xi2===0 ? ctx.moveTo(px3,py3) : ctx.lineTo(px3,py3);
      }
      ctx.stroke();
    });
  } else {
    // Idle: thin horizontal bars with scanline
    var eyeB = 0.55 + 0.35*p;
    // Left eye
    ctx.fillStyle = G+eyeB+')';
    ctx.beginPath(); ctx.roundRect(-18,-146,14,5,2.5); ctx.fill();
    ctx.fillStyle = G+0.15+')';
    ctx.beginPath(); ctx.roundRect(-20,-149,18,11,4); ctx.fill();
    // Right eye
    ctx.fillStyle = G+eyeB+')';
    ctx.beginPath(); ctx.roundRect( 4,-146,14,5,2.5); ctx.fill();
    ctx.fillStyle = G+0.15+')';
    ctx.beginPath(); ctx.roundRect( 2,-149,18,11,4); ctx.fill();
    // Blink animation
    if(Math.sin(t*0.7) > 0.95){
      ctx.fillStyle = '#010808';
      ctx.fillRect(-20,-148,18,9); ctx.fillRect(2,-148,18,9);
    }
  }

  // ── MOUTH – audio bars ───────────────────────────
  var numBars = 10;
  for(var mi=0; mi<numBars; mi++){
    var barH = isActive
      ? 3 + Math.abs(Math.sin(t*7 + mi*0.65)) * 11
      : 2 + Math.abs(Math.sin(t*1.2 + mi*0.4)) * 3;
    var barX = -19 + mi*4;
    var barAlpha = isActive ? 0.55+0.35*p2 : 0.2+0.1*p;
    ctx.fillStyle = G+barAlpha+')';
    ctx.beginPath(); ctx.roundRect(barX, -127-barH/2, 3, barH, 1); ctx.fill();
    // Glow
    if(isActive){
      ctx.fillStyle = G+0.1+')';
      ctx.beginPath(); ctx.roundRect(barX-1,-128-barH/2,5,barH+2,2); ctx.fill();
    }
  }

  // Chin vent
  [0,1,2].forEach(function(vi){
    ctx.fillStyle = G+0.15+')';
    ctx.beginPath(); ctx.roundRect(-9,-110+vi*3,18,2,1); ctx.fill();
  });

  // ── ANTENNA – signal tower ───────────────────────
  ctx.strokeStyle = G+0.3+')'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(10,-178); ctx.lineTo(16,-200); ctx.stroke();
  // Ball
  var ballG = ctx.createRadialGradient(16,-202,0,16,-202,6);
  ballG.addColorStop(0,'rgba(255,255,255,0.9)');
  ballG.addColorStop(0.3,G+'0.95)');
  ballG.addColorStop(1,G+'0.1)');
  ctx.fillStyle = ballG;
  ctx.beginPath(); ctx.arc(16,-202,5,0,Math.PI*2); ctx.fill();
  // Signal rings (active)
  if(isActive){
    [10,17,24].forEach(function(r,i){
      ctx.strokeStyle = G+(0.3-i*0.08)+')'; ctx.lineWidth=1.2;
      ctx.beginPath(); ctx.arc(16,-202,r,Math.PI,0,true); ctx.stroke();
    });
  } else {
    ctx.strokeStyle = G+(0.15+0.1*p)+')'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.arc(16,-202,9,Math.PI,0,true); ctx.stroke();
  }

  // ── SCAN LINE across visor ───────────────────────
  var scanY = -165 + ((t*18) % 51);
  ctx.fillStyle = G+0.06+')';
  ctx.fillRect(-24, scanY, 48, 3);

  // ── AMBIENT GLOW when active ─────────────────────
  if(isActive){
    var glowG = ctx.createRadialGradient(0,-140,20,0,-140,70);
    glowG.addColorStop(0,G+(0.07+0.04*p)+')');
    glowG.addColorStop(1,'rgba(0,255,140,0)');
    ctx.fillStyle = glowG;
    ctx.beginPath(); ctx.arc(0,-140,70,0,Math.PI*2); ctx.fill();
    // Speaking pulse ring
    var wr = 38 + Math.sin(t*5)*6;
    ctx.strokeStyle = G+0.22+')'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.arc(0,-140,wr,0,Math.PI*2); ctx.stroke();
    ctx.strokeStyle = G+0.08+')'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(0,-140,wr+16,0,Math.PI*2); ctx.stroke();
  }

  drawNameplate(0,-214,d);
}

// ─── NAMEPLATE ────────────────────────────────────
function drawNameplate(x,y,d) {
  var lbl=d.name+' · '+d.role;
  ctx.font='bold 12px DM Mono,monospace';
  var tw=ctx.measureText(lbl).width;
  var pad=9,h=22,r=4;
  var bx=x-tw/2-pad-9, bw=tw+pad*2+12;
  ctx.fillStyle='rgba(4,6,12,.96)';
  ctx.beginPath(); ctx.roundRect(bx,y-h,bw,h,r); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.1)'; ctx.lineWidth=1.2;
  ctx.beginPath(); ctx.roundRect(bx,y-h,bw,h,r); ctx.stroke();
  ctx.fillStyle=d.c; ctx.beginPath(); ctx.arc(bx+9,y-h/2,3.5,0,Math.PI*2); ctx.fill();
  var nw=ctx.measureText(d.name).width;
  ctx.fillStyle=d.c; ctx.font='bold 10px DM Mono,monospace';
  ctx.fillText(d.name,bx+18,y-h/2+3.5);
  ctx.fillStyle='rgba(50,80,100,.9)'; ctx.font='400 9px DM Mono,monospace';
  ctx.fillText(' · '+d.role,bx+18+nw,y-h/2+3.5);
}

var TTS_WORKER_URL = 'https://decisight-db.old-wind-8d3a.workers.dev';
var audioCache={}, curAudio=null, muted=false, _vTO=null;
var _workerFailed=false;

// ── Low-level audio helpers ──────────────────────────────────────
function stopV(){
  if(curAudio){try{curAudio.pause();curAudio.currentTime=0;}catch(e){} curAudio=null;}
  if(_vTO){clearTimeout(_vTO);_vTO=null;}
}

function pauseV(){
  if(curAudio&&!curAudio.paused) curAudio.pause();
}

function resumeV(){
  if(curAudio&&curAudio.paused) curAudio.play().catch(function(){});
}

function b64toUrl(b64){
  var bin=atob(b64), arr=new Uint8Array(bin.length);
  for(var i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
  return URL.createObjectURL(new Blob([arr],{type:'audio/mpeg'}));
}

function playAudio(url, cb){
  stopV();
  var a=new Audio(url); a.volume=muted?0:1; curAudio=a;
  var done=false;
  function fin(){if(done)return;done=true;curAudio=null;if(cb)cb();}
  a.onended=fin; a.onerror=fin;
  _vTO=setTimeout(fin,90000);
  a.play().catch(fin);
}

function playStatic(cb){
  if(muted){if(cb)cb();return;}  // skip static when muted
  try{
    var ctx2=new(window.AudioContext||window.webkitAudioContext)();
    var buf=ctx2.createBuffer(1,ctx2.sampleRate*0.12,ctx2.sampleRate);
    var d=buf.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.08;
    var src=ctx2.createBufferSource(); src.buffer=buf;
    src.connect(ctx2.destination); src.start();
    src.onended=function(){ctx2.close();if(cb)cb();};
  }catch(e){if(cb)cb();}
}

// ── Core speak function ──────────────────────────────────────────
async function doSpeak(id, text, cb){
  stopV();
  // muted: audio will play at volume=0, cb fires naturally when done
  var clean=text.replace(/<[^>]+>/g,'').trim();
  var ck=id+':'+clean.slice(0,40);
  async function _speak(){
    if(typeof AUDIO_MAP!=='undefined'&&AUDIO_MAP[ck]){
      if(!audioCache[ck]) audioCache[ck]=b64toUrl(AUDIO_MAP[ck]);
      playAudio(audioCache[ck],cb); return;
    }
    if(!_workerFailed){
      try{
        var resp=await fetch(TTS_WORKER_URL,{method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({id:id,text:clean})});
        if(resp.ok){var blob=await resp.blob();
          audioCache[ck]=URL.createObjectURL(blob);
          playAudio(audioCache[ck],cb); return;}
      }catch(e){_workerFailed=true;}
    }
    var wc=clean.split(' ').length;
    _vTO=setTimeout(function(){if(cb)cb();},Math.max(2500,wc/145*60000)+500);
  }
  if(id==='ds') playStatic(function(){_speak();});
  else _speak();
}

// ── SUN SHAFTS from windows ──────────────────────────────────────
function drawSunShafts(t) {
  var pulse = 0.85 + Math.sin(t*0.3)*0.08;
  [1.2, 5.2, 9.2].forEach(function(wx, wi) {
    // Window center in iso
    var wTop = iso(wx+1.1, 0, 2.1);
    var wBotL = iso(wx+0.2, 0, 0.55);
    var wBotR = iso(wx+2.0, 0, 0.55);
    // Floor hit point — light spreads across floor
    var floorL = iso(wx-0.5, 4+wi*0.5, 0);
    var floorR = iso(wx+3.0, 4+wi*0.5, 0);

    ctx.save();
    var shaft = ctx.createLinearGradient(wTop.sx, wTop.sy, floorL.sx, floorL.sy);
    shaft.addColorStop(0, 'rgba(160,190,255,' + (0.10*pulse) + ')');
    shaft.addColorStop(0.4, 'rgba(140,170,240,' + (0.05*pulse) + ')');
    shaft.addColorStop(1, 'rgba(120,150,220,0)');
    ctx.fillStyle = shaft;
    ctx.beginPath();
    ctx.moveTo(wBotL.sx, wBotL.sy);
    ctx.lineTo(wBotR.sx, wBotR.sy);
    ctx.lineTo(floorR.sx, floorR.sy);
    ctx.lineTo(floorL.sx, floorL.sy);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // Floor light pool
    var fCenter = iso(wx+1.1, 3.5+wi*0.3, 0.01);
    var poolG = ctx.createRadialGradient(fCenter.sx, fCenter.sy, 5, fCenter.sx, fCenter.sy+20, 80);
    poolG.addColorStop(0, 'rgba(140,170,255,' + (0.08*pulse) + ')');
    poolG.addColorStop(1, 'rgba(120,150,230,0)');
    ctx.fillStyle = poolG;
    ctx.beginPath();
    ctx.ellipse(fCenter.sx, fCenter.sy+20, 70, 22, 0, 0, Math.PI*2);
    ctx.fill();
  });

  // Floating dust motes
  if(!window._dustMotes) {
    window._dustMotes = [];
    for(var di=0;di<28;di++) {
      _dustMotes.push({
        x: 1.5+Math.random()*11, y: 0.5+Math.random()*8,
        z: 0.3+Math.random()*2.2, speed: 0.002+Math.random()*0.006,
        size: 0.8+Math.random()*1.4, phase: Math.random()*Math.PI*2,
        waftX: (Math.random()-.5)*0.004, waftY: (Math.random()-.5)*0.003
      });
    }
  }
  _dustMotes.forEach(function(m) {
    m.x += m.waftX + Math.sin(t*0.4+m.phase)*0.003;
    m.y += m.waftY + Math.cos(t*0.3+m.phase)*0.002;
    m.z += m.speed * 0.1;
    if(m.x<0.5||m.x>13||m.y<0.2||m.y>9||m.z>2.8) {
      m.x=1.5+Math.random()*11; m.y=0.5+Math.random()*7; m.z=0.2+Math.random()*0.5;
    }
    var mp = iso(m.x, m.y, m.z);
    var inLight = m.y < 5 && m.x > 0.8 && m.x < 12;
    if(!inLight) return;
    var alpha = 0.25 + Math.sin(t*0.8+m.phase)*0.12;
    ctx.fillStyle = 'rgba(180,200,255,' + alpha + ')';
    ctx.beginPath();
    ctx.arc(mp.sx, mp.sy, m.size, 0, Math.PI*2);
    ctx.fill();
  });
}

// RENDER LOOP
// ═══════════════════════════════════════════════════
function loop(ts){
  requestAnimationFrame(loop);
  var t=ts/1000;
  ctx.clearRect(0,0,W,H);
  setOrigin();

  // Dark premium office — deep navy/charcoal
  var bg=ctx.createRadialGradient(W*.38,H*.3,60,W*.5,H*.55,Math.max(W,H)*.9);
  bg.addColorStop(0,'#141c2a'); bg.addColorStop(.55,'#0d1420'); bg.addColorStop(1,'#080e18');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);

  drawRoom();
  drawSunShafts(t);
  // furniture drawn in layers below (interleaved with chars)

  Object.keys(CHARS).forEach(function(id){
    var p=charPos[id],tg=charTgt[id];
    p.x+=(tg.x-p.x)*.05; p.y+=(tg.y-p.y)*.05;
  });

  // Layer 1: Room (whiteboard, credenza, plants)
  drawFurnitureBack();

  // Layer 2: North chairs — drawn BEFORE north characters so chars appear in front
  drawFurnitureNorthChairs();

  // Cats
  updateCats(t);
  drawCat(catBlack.x, catBlack.y, 'black', catBlack.sleeping, t);
  drawCat(catWhite.x, catWhite.y, 'white', catWhite.sleeping, t);

  // Layer 3: Sort characters and table together by depth
  var sorted=Object.keys(CHARS).sort(function(a,b){
    return (charPos[a].x+charPos[a].y)-(charPos[b].x+charPos[b].y);
  });

  var tableDrawn=false;
  var TABLE_FRONT_DEPTH = TX+TY+1.0;

  sorted.forEach(function(id){
    var depth=charPos[id].x+charPos[id].y;
    if(!tableDrawn && depth > TABLE_FRONT_DEPTH){
      drawFurnitureTable();
      tableDrawn=true;
    }
    drawChar(id,t);
  });
  if(!tableDrawn) drawFurnitureTable();

  // Subtle vignette for cinematic depth
  var vig=ctx.createRadialGradient(W*.5,H*.45,H*.15,W*.5,H*.5,H*.78);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(.7,'rgba(0,0,0,.08)');
  vig.addColorStop(1,'rgba(0,0,0,.38)');
  ctx.fillStyle=vig; ctx.fillRect(0,0,W,H);

  if(activeSpeaker) positionBubble(activeSpeaker);
}

buildPills(); startTimer(); requestAnimationFrame(loop);

// Check if TTS Worker is available and show status
(async function checkVoice(){
  try {
    var r = await fetch(TTS_WORKER_URL, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({id:'ds', text:'test'})
    });
    var dot = document.getElementById('voiceStatus');
    var lbl = document.getElementById('voiceLabel');
    if(r.ok){
      dot.style.background='#22c55e';
      dot.style.boxShadow='0 0 6px #22c55e';
      lbl.style.color='#22c55e';
      lbl.textContent='Voice ON';
    } else {
      dot.style.background='#ef4444';
      lbl.textContent='Voice OFF';
    }
  } catch(e) {
    // Worker not reachable - browser voices only
    var lbl=document.getElementById('voiceLabel');
    if(lbl) lbl.textContent='Browser Voice';
  }
})();
